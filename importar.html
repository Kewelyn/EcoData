<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Importador EcoData - JSON Filtrado</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 40px; text-align: center; background: #f0f2f5; }
        .box { background: white; padding: 30px; border-radius: 12px; display: inline-block; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 500px; }
        h2 { color: #1b5e20; }
        #status { margin-top: 20px; font-weight: bold; color: #2e7d32; min-height: 24px; }
        .btn { background: #2e7d32; color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .btn:hover { background: #1b5e20; }
    </style>
</head>
<body>

<div class="box">
    <h2>📤 Importador EcoData</h2>
    <p>Selecione o arquivo JSON com as espécies.</p>
    <input type="file" id="json-file" accept=".json" style="margin-bottom: 20px;">
    <br>
    <button class="btn" onclick="importarDados()">Iniciar Importação</button>
    <div id="status"></div>
</div>

<script>
    async function importarDados() {
        const fileInput = document.getElementById('json-file');
        const status = document.getElementById('status');

        if (!fileInput.files[0]) return alert("Por favor, selecione o arquivo JSON!");

        const reader = new FileReader();
        
        reader.onload = async (e) => {
            try {
                const todasEspecies = JSON.parse(e.target.result);
                status.innerHTML = `Lendo ${todasEspecies.length} espécies...`;

                for (let i = 0; i < todasEspecies.length; i++) {
                    const esp = todasEspecies[i];

                    // MAPEAMENTO: Aqui filtramos apenas os campos que você pediu
                    const dadosParaSalvar = {
                        especie: esp.especie || "",
                        nome_comum: esp.nome_comum || "",
                        grupo: esp.grupo || "",
                        categoria: esp.categoria || "",
                        justificativa: esp.justificativa || "",
                        estado: esp.estado || "",
                        regiao: esp.regiao || "",
                        bioma: esp.bioma || "",
                        tendencia_populacional: esp.tendencia_populacional || "",
                        ameaca: esp.ameaca || "",
                        unidade_conservacao_federal: esp.unidade_de_conservacao_federal || "",
                        unidade_conservacao_estadual: esp.unidade_de_conservacao_estadual || "",
                        acao_conservacao: esp.acao_conservacao || "",
                        plano_de_acao: esp.plano_de_acao || ""
                    };

                    // Envia para a coleção "especies" no Firestore
                    await db.collection("especies").add(dadosParaSalvar);
                    
                    status.innerHTML = `Importando: ${i + 1} de ${todasEspecies.length}...`;
                }

                status.innerHTML = "✅ Sucesso! Dados filtrados e salvos.";
            } catch (err) {
                status.innerHTML = "❌ Erro: Verifique se o arquivo é um JSON válido.";
                console.error(err);
            }
        };

        reader.readAsText(fileInput.files[0]);
    }
</script>

</body>
</html>
